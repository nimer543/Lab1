<!-- app/views/templates/base.html -->
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelPlanner{% endblock %}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="navbar-container">
                <a href="/" class="logo-link">
                    <span>TravelPlanner</span>
                </a>
                <div class="nav-links">
                    <a href="/" class="btn btn-secondary">Główna</a>
                    <a href="/trips/new" class="btn btn-primary">Nowa podróż</a>
                </div>
            </div>
        </nav>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <script src="{{ request.url_for('static', path='/js/main.js') }}"></script>
</body>
</html>
